name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     args: '--target aarch64-apple-darwin', label: macos-arm64 }
          - { os: macos-14,     args: '--target x86_64-apple-darwin',  label: macos-x64 }
          - { os: ubuntu-22.04, args: '',                              label: linux-x64 }
          - { os: windows-2022, args: '',                              label: windows-x64 }
    runs-on: ${{ matrix.os }}
    name: build-${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS)
        if: runner.os == 'macOS'
        run: rustup target add ${{ contains(matrix.args, 'x86_64') && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            libssl-dev \
            patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build + release (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Yoink ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
